<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- book cover -->
  <rect x="3" y="5" width="26" height="23" rx="2" fill="#292524"/>
  <!-- left page -->
  <path d="M5 7 L15.5 7 L15.5 26 Q10 24.5 5 25.5 Z" fill="#fafaf9"/>
  <!-- right page -->
  <path d="M16.5 7 L27 7 L27 25.5 Q22 24.5 16.5 26 Z" fill="#fafaf9"/>
