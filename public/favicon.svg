  <line x1="10.25" y1="11" x2="10.25" y2="22" stroke="#292524" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="7" y1="14.5" x2="13.5" y2="14.5" stroke="#292524" stroke-width="1.8" stroke-linecap="round"/>
  <!-- text lines on right page -->
  <line x1="19" y1="12" x2="25" y2="12" stroke="#a8a29e" stroke-width="1" stroke-linecap="round"/>
  <line x1="19" y1="15" x2="24" y2="15" stroke="#a8a29e" stroke-width="1" stroke-linecap="round"/>
  <line x1="19" y1="18" x2="25" y2="18" stroke="#a8a29e" stroke-width="1" stroke-linecap="round"/>
  <line x1="19" y1="21" x2="23" y2="21" stroke="#a8a29e" stroke-width="1" stroke-linecap="round"/>
</svg>
